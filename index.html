<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
}

.hero{
    position:relative;
    width:100%;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#muteBtn{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;

    background:rgba(0,0,0,0.7);
    color:white;
    border:none;
    border-radius:50px;
    padding:12px 18px;
    cursor:pointer;
    font-size:18px;
}

#muteBtn:hover{
    background:rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<div class="hero">

    <video id="myVideo" autoplay muted loop playsinline>
        <source src="selayang pandang.mp4" type="video/mp4">
    </video>

    <button id="muteBtn">🔇</button>

</div>

<script>

const video = document.getElementById("myVideo");
const btn = document.getElementById("muteBtn");

btn.addEventListener("click", () => {

    if(video.muted){
        video.muted = false;
        btn.innerHTML = "🔊";
    }else{
        video.muted = true;
        btn.innerHTML = "🔇";
    }

});

</script>

</body>
</html>
