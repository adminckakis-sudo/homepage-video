<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT Kereta Api Indonesia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

/* HERO */

.hero{
    position:relative;
    width:100vw;
    height:100vh;
}

/* VIDEO */

.hero video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        rgba(0,0,0,.35),
        rgba(0,0,0,.55)
    );
}

/* CONTENT */

.content{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    width:90%;
    max-width:1000px;

    text-align:center;

    color:white;

    z-index:10;

}

.content h1{

    font-size:58px;
    font-weight:700;

    margin-bottom:20px;

    text-shadow:
    0 2px 10px rgba(0,0,0,.5);

}

.content p{

    font-size:22px;
    line-height:1.6;

    text-shadow:
    0 2px 10px rgba(0,0,0,.5);

}

/* BUTTON */

.btn{

    display:inline-block;

    margin-top:30px;

    background:#ff7a00;

    color:white;

    text-decoration:none;

    padding:14px 28px;

    border-radius:50px;

    font-weight:600;

    transition:.3s;

}

.btn:hover{

    background:#ff9000;

}

/* CONTROLS */

.controls{

    position:absolute;

    right:20px;
    bottom:20px;

    display:flex;
    gap:10px;

    z-index:20;

    background:
    rgba(0,0,0,.55);

    backdrop-filter:
    blur(10px);

    padding:10px;

    border-radius:50px;

}

.controls button{

    width:45px;
    height:45px;

    border:none;

    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    color:white;

    cursor:pointer;

    font-size:18px;

    transition:.3s;

}

.controls button:hover{

    background:
    rgba(255,255,255,.3);

}

/* MOBILE */

@media(max-width:768px){

.content h1{

    font-size:34px;

}

.content p{

    font-size:16px;

}

.btn{

    padding:12px 24px;

}

.controls{

    bottom:15px;
    right:15px;

}

.controls button{

    width:40px;
    height:40px;

}

}

</style>
</head>

<body>

<div class="hero">

    <!-- GANTI DENGAN VIDEO ANDA -->
    <video
        id="video"
        autoplay
        muted
        loop
        playsinline>

        <source
            src="selayang pandang.mp4"
            type="video/mp4">

    </video>

    <div class="overlay"></div>

    <div class="content">

        <h1>
            PT Kereta Api Indonesia (Persero)
        </h1>

        <p>
            Menggerakkan transportasi berkelanjutan,
            meningkatkan kualitas hidup masyarakat.
        </p>

        <a href="#" class="btn">
            Selengkapnya
        </a>

    </div>

    <div class="controls">

        <button id="playPause">
            ⏸
        </button>

        <button id="muteBtn">
            🔇
        </button>

        <button id="fullscreen">
            ⛶
        </button>

    </div>

</div>

<script>

const video =
document.getElementById("video");

const playPause =
document.getElementById("playPause");

const muteBtn =
document.getElementById("muteBtn");

const fullscreen =
document.getElementById("fullscreen");

/* PLAY PAUSE */

playPause.addEventListener(
'click',
()=>{

    if(video.paused){

        video.play();

        playPause.innerHTML='⏸';

    }else{

        video.pause();

        playPause.innerHTML='▶';

    }

});

/* MUTE */

muteBtn.addEventListener(
'click',
()=>{

    video.muted=
    !video.muted;

    muteBtn.innerHTML=
    video.muted
    ? '🔇'
    : '🔊';

});

/* FULLSCREEN */

fullscreen.addEventListener(
'click',
()=>{

    const hero =
    document.querySelector('.hero');

    if(hero.requestFullscreen){

        hero.requestFullscreen();

    }else if(
        hero.webkitRequestFullscreen
    ){

        hero.webkitRequestFullscreen();

    }

});

</script>

</body>
</html>
